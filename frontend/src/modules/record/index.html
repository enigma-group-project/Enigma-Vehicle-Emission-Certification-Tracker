<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Certificate Creation · Vehicle-Emission</title>
<link rel="stylesheet" href="../../shared/layout.css"/></head>
<body>
<header class="enigma-header">
  <h1>2 · Certificate Creation <span class="owner">member2</span></h1>
  <p class="scenario">An Accredited Test Center issues an EmissionCert: store its hash + IPFS CID on-chain.</p>
  <label class="netrow">Network: <select id="net" class="net"></select></label>
</header>
<main><div class="card">
  <button id="connect">Connect wallet (Test Center)</button>
  <p id="who" class="muted"></p>
  <h3>EmissionCert details</h3>
  <input id="key" placeholder="asset id / VIN (natural key)"/>
  <input id="artifact" placeholder="test report text (stands in for the PDF to hash)"/>
  <input id="cid" placeholder="IPFS CID of the test report"/>
  <input id="owner" placeholder="0x… vehicle/facility owner"/>
  <input id="meta" placeholder="ipfs://… record.json"/>
  <button id="create">Issue certificate</button>
  <pre id="out" class="out"></pre>
</div></main>
<script type="module" src="record.js"></script>
</body></html>
